services:
  - type: web
    name: signalyze-ai
    runtime: python
    plan: starter
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: python -m app.deploy_service
    healthCheckPath: /health
    disk:
      name: signalyze-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: ENABLE_BACKGROUND_LOOP
        value: "false"
      - key: BACKGROUND_LOOP_INTERVAL_MINUTES
        value: "15"
      - key: FETCH_INTERVAL_MINUTES
        value: "15"
      - key: ENABLE_PUBLIC_POSTING
        value: "true"
      - key: ENABLE_ECONOMIC_CALENDAR
        value: "true"
      - key: ENABLE_CONFIDENCE_CALIBRATION
        value: "true"
      - key: MAX_PUBLISHABLE_SIGNALS_PER_RUN
        value: "2"
      - key: RUN_HISTORY_PATH
        value: /var/data/run_history.jsonl
      - key: CALIBRATION_MODEL_PATH
        value: /var/data/calibration_model.json
      - key: TRADE_STATE_PATH
        value: /var/data/trade_state.json
      - key: ROLLBACK_SWITCH_FILE
        value: /var/data/ROLLBACK
